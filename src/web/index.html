<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>뉴스 모니터링 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── 디자인 토큰 ─────────────────────────────────────── */
    :root {
      color-scheme: dark;
      /* 컬러 — 다크 테마 */
      --bg:            #0d1117;
      --surface:       #161b22;
      --surface-2:     #1f2937;
      --surface-3:     #253345;
      --text:          #e6edf3;
      --text-dim:      #8b949e;
      --text-dimmer:   #4d5566;
      --border:        #21262d;
      --border-soft:   #30363d;
      --accent:        #4d9cf6;
      --accent-dim:    rgba(77,156,246,.12);

      /* 카테고리 액센트 */
      --c-global-ai:        #a78bfa;  /* 보라 — 글로벌 AI */
      --c-global-ai-bg:     rgba(167,139,250,.1);
      --c-global-finance:   #34d399;  /* 에메랄드 — 글로벌 금융 AI */
      --c-global-finance-bg:rgba(52,211,153,.1);
      --c-domestic-finance: #fbbf24;  /* 앰버 — 국내 금융 AI */
      --c-domestic-finance-bg:rgba(251,191,36,.1);

      /* 점수 시그널 */
      --score-high:    #f87171;   /* 8–10 */
      --score-high-bg: rgba(248,113,113,.12);
      --score-mid:     #fbbf24;   /* 5–7 */
      --score-mid-bg:  rgba(251,191,36,.12);
      --score-low:     #4d5566;   /* 0–4 */
      --score-low-bg:  rgba(77,85,102,.18);

      /* 간격·형태 */
      --r-sm:  8px;
      --r:    14px;
      --r-lg: 20px;
      --gap:  16px;
      --shadow:        0 4px 24px rgba(0,0,0,.35);
      --shadow-alert:  0 6px 32px rgba(77,156,246,.12);

      /* 타이포 */
      --font: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', system-ui, sans-serif;
      --fs-xs: 11px;
      --fs-sm: 13px;
      --fs-base: 15px;
      --fs-lg: 17px;
      --fs-xl: 22px;
      --fs-2xl: 28px;
    }

    /* ─── 리셋·베이스 ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: var(--fs-base);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ─── 레이아웃 ─────────────────────────────────────────── */
    .container {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ─── 헤더 ─────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,17,23,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      max-width: 1040px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--c-global-ai) 0%, var(--accent) 100%);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: var(--fs-lg);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-title .subtitle {
      font-size: var(--fs-xs);
      color: var(--text-dim);
      font-weight: 400;
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ─── 버튼 ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 0;
      border-radius: var(--r-sm);
      font-family: var(--font);
      font-size: var(--fs-sm);
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { opacity: .88; }

    /* ─── 수집 상태 ─────────────────────────────────────────── */
    .collect-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-sm);
      color: var(--text-dim);
    }
    .status-ok  { color: var(--c-global-finance); }
    .status-err { color: var(--score-high); }
    .config-empty { color: var(--text-dim); font-size: var(--fs-sm); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-soft);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── 에러 배너 ─────────────────────────────────────────── */
    .error-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: var(--r);
      padding: 12px 16px;
      font-size: var(--fs-sm);
      color: #fca5a5;
      margin: 12px 0;
    }
    .error-banner::before { content: '⚠'; flex-shrink: 0; font-size: 15px; }

    /* ─── 설정 패널 ─────────────────────────────────────────── */
    .config-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 18px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .config-panel .config-label {
      font-size: var(--fs-xs);
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-right: 4px;
    }

    .threshold-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface-2);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-sm);
      padding: 3px 10px;
      font-size: var(--fs-sm);
    }

    .threshold-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .threshold-name { color: var(--text-dim); }
    .threshold-value { font-weight: 700; color: var(--text); }

    /* ─── 섹션 ─────────────────────────────────────────────── */
    main { padding: 0 0 48px; }

    .section { margin-bottom: 40px; }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: var(--fs-xl);
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: 700;
    }

    .section-badge.alert-badge {
      background: rgba(248,113,113,.15);
      color: var(--score-high);
    }

    .section-badge.news-badge {
      background: var(--surface-2);
      color: var(--text-dim);
    }

    .section-desc {
      font-size: var(--fs-sm);
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ─── 카드 그리드 ─────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--gap);
    }

    /* ─── 카드 ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s, box-shadow .2s, transform .2s;
    }
    .card:hover {
      border-color: var(--border-soft);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }
    .card:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    /* 알림 카드 — 더 강조 */
    .card-alert {
      border-left: 3px solid var(--accent);
      box-shadow: var(--shadow-alert);
    }
    .card-alert:hover { box-shadow: 0 8px 40px rgba(77,156,246,.18); }

    /* 카테고리별 좌측 보더 색 */
    .card-alert[data-cat="global_ai"]          { border-left-color: var(--c-global-ai); }
    .card-alert[data-cat="global_finance_ai"]  { border-left-color: var(--c-global-finance); }
    .card-alert[data-cat="domestic_finance_ai"]{ border-left-color: var(--c-domestic-finance); }

    /* 카드 상단 행 */
    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-top-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* 알림 표식 */
    .alert-badge-card {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-dim);
      background: var(--surface-2);
      border-radius: var(--r-sm);
      padding: 3px 8px;
      letter-spacing: .04em;
    }
    .alert-badge-card::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* 카테고리 pill */
    .cat-pill {
      display: inline-flex;
      align-items: center;
      font-size: var(--fs-xs);
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      letter-spacing: .03em;
    }
    .cat-pill.cat-global-ai {
      background: var(--c-global-ai-bg);
      color: var(--c-global-ai);
    }
    .cat-pill.cat-global-finance {
      background: var(--c-global-finance-bg);
      color: var(--c-global-finance);
    }
    .cat-pill.cat-domestic-finance {
      background: var(--c-domestic-finance-bg);
      color: var(--c-domestic-finance);
    }
    .cat-pill.cat-unknown {
      background: var(--surface-2);
      color: var(--text-dim);
    }

    /* 점수 배지 */
    .score-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 24px;
      padding: 0 8px;
      border-radius: var(--r-sm);
      font-size: var(--fs-sm);
      font-weight: 700;
      letter-spacing: -.01em;
    }
    .score-badge.score-high {
      background: var(--score-high-bg);
      color: var(--score-high);
    }
    .score-badge.score-mid {
      background: var(--score-mid-bg);
      color: var(--score-mid);
    }
    .score-badge.score-low {
      background: var(--score-low-bg);
      color: #8b949e;
    }
    .score-badge.score-null {
      background: var(--surface-2);
      color: var(--text-dimmer);
    }

    /* 카드 제목 */
    .card-title {
      font-size: var(--fs-base);
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: -0.015em;
    }
    .card-alert .card-title {
      font-size: var(--fs-lg);
    }

    .card-title a {
      color: var(--text);
    }
    .card-title a:hover { color: var(--accent); }

    /* 판단 근거 */
    .card-reason {
      font-size: var(--fs-sm);
      color: var(--text-dim);
      line-height: 1.55;
      border-left: 2px solid var(--border-soft);
      padding-left: 10px;
    }
    .card-alert .card-reason {
      border-left-color: var(--surface-3);
    }

    /* 메타 */
    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      font-size: var(--fs-xs);
      color: var(--text-dim);
      margin-top: auto;
    }
    .card-meta .source {
      color: var(--text);
      font-weight: 500;
    }
    .card-meta time { color: var(--text-dim); }
    .card-meta .dot { color: var(--text-dimmer); }

    /* ─── 빈 상태 ─────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 24px;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: .5;
    }

    .empty-state p {
      font-size: var(--fs-base);
      margin-bottom: 6px;
    }

    .empty-state .empty-hint {
      font-size: var(--fs-sm);
      color: var(--text-dimmer);
    }

    /* ─── 구분선 ─────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 40px 0;
    }

    /* ─── 모션 민감 사용자 배려 ─────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; }
    }

    /* ─── 반응형 ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      .header-inner { padding: 12px 16px; gap: 10px; }
      .container { padding: 0 14px; }
      .card-grid { grid-template-columns: 1fr; }
      .section-title { font-size: 18px; }
      .config-panel { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- ── 헤더 ───────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <div class="header-title">
        <div class="header-logo" aria-hidden="true">◈</div>
        <div>
          <h1>뉴스 모니터링</h1>
          <div class="subtitle">AI · 금융 자동 수집 &amp; 중요도 평가</div>
        </div>
      </div>
      <div class="header-actions">
        <div id="collect-status" class="collect-status" aria-live="polite"></div>
        <button id="collect-btn" class="btn btn-primary" onclick="collect()">
          수집 실행
        </button>
      </div>
    </div>
  </header>

  <!-- ── 본문 ───────────────────────────────────────────── -->
  <main>
    <div class="container">

      <!-- 설정 패널 -->
      <div id="config" class="config-panel" role="region" aria-label="임계값 설정"></div>

      <!-- 전역 에러 배너 -->
      <div id="global-error" style="display:none"></div>

      <!-- 발송 대상 알림 섹션 -->
      <section class="section" aria-labelledby="alerts-heading">
        <div class="section-header">
          <div>
            <h2 class="section-title" id="alerts-heading">
              발송 대상 알림
              <span id="alerts-count" class="section-badge alert-badge" aria-label="알림 수"></span>
            </h2>
            <p class="section-desc">임계값을 초과한 중요 뉴스 — 알림 발송 대상</p>
          </div>
        </div>
        <div id="alerts" class="card-grid" role="list"></div>
      </section>

      <div class="divider"></div>

      <!-- 전체 수집 뉴스 섹션 -->
      <section class="section" aria-labelledby="news-heading">
        <div class="section-header">
          <div>
            <h2 class="section-title" id="news-heading">
              전체 수집 뉴스
              <span id="news-count" class="section-badge news-badge" aria-label="뉴스 수"></span>
            </h2>
            <p class="section-desc">수집된 전체 뉴스 — 카테고리·중요도(0–10) 포함</p>
          </div>
        </div>
        <div id="news" class="card-grid" role="list"></div>
      </section>

    </div>
  </main>

<script>
// ─── 상수 ──────────────────────────────────────────────────
const LABELS = {
  global_ai:           '글로벌 AI',
  global_finance_ai:   '글로벌 금융 AI',
  domestic_finance_ai: '국내 금융 AI'
};

const CAT_CLASS = {
  global_ai:           'cat-global-ai',
  global_finance_ai:   'cat-global-finance',
  domestic_finance_ai: 'cat-domestic-finance'
};

const CAT_DOT_COLOR = {
  global_ai:           'var(--c-global-ai)',
  global_finance_ai:   'var(--c-global-finance)',
  domestic_finance_ai: 'var(--c-domestic-finance)'
};

// ─── 헬퍼 ──────────────────────────────────────────────────
function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scoreClass(score) {
  if (score === null || score === undefined) return 'score-null';
  const n = Number(score);
  if (n >= 8) return 'score-high';
  if (n >= 5) return 'score-mid';
  return 'score-low';
}

function scoreLabel(score) {
  if (score === null || score === undefined) return '–';
  return String(score);
}

function catPill(catKey) {
  const cls   = CAT_CLASS[catKey]  || 'cat-unknown';
  const label = LABELS[catKey]     || escapeHtml(catKey);
  return `<span class="cat-pill ${cls}" aria-label="카테고리: ${label}">${label}</span>`;
}

function formatDate(raw) {
  if (!raw) return '';
  try {
    const d = new Date(raw);
    if (isNaN(d)) return escapeHtml(raw);
    return d.toLocaleString('ko-KR', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch (_) { return escapeHtml(raw); }
}

function showGlobalError(msg) {
  const el = document.getElementById('global-error');
  el.style.display = '';
  el.innerHTML = `<div class="error-banner">${escapeHtml(msg)}</div>`;
}

function clearGlobalError() {
  const el = document.getElementById('global-error');
  el.style.display = 'none';
  el.innerHTML = '';
}

// ─── 설정 로드 ─────────────────────────────────────────────
async function loadConfig() {
  const el = document.getElementById('config');
  try {
    const cfg = await (await fetch('/api/config')).json();
    const th  = cfg && cfg.thresholds;
    if (!th) {
      el.innerHTML = '<span class="config-label">임계값</span><span class="config-empty">설정을 불러올 수 없습니다.</span>';
      return;
    }
    const items = Object.keys(th).map(k => {
      const color = CAT_DOT_COLOR[k] || 'var(--text-dim)';
      const name  = LABELS[k] || escapeHtml(k);
      return `<span class="threshold-item">
        <span class="threshold-dot" style="background:${color}" aria-hidden="true"></span>
        <span class="threshold-name">${name}</span>
        <span class="threshold-value">${escapeHtml(String(th[k]))}</span>
      </span>`;
    }).join('');
    el.innerHTML = `<span class="config-label">임계값</span>${items}`;
  } catch (e) {
    el.innerHTML = '<span class="config-label">임계값</span><span class="config-empty">설정을 불러올 수 없습니다.</span>';
  }
}

// ─── 카드 렌더 ─────────────────────────────────────────────
function buildCard(it, isAlert) {
  const catKey    = it.category || '';
  const scoreVal  = (it.importance_score !== undefined) ? it.importance_score : null;
  const sCls      = scoreClass(scoreVal);
  const sLabel    = scoreLabel(scoreVal);
  const safeTitle = escapeHtml(it.title || '(제목 없음)');
  const safeReason= escapeHtml(it.importance_reason || '');
  const safeSrc   = escapeHtml(it.source || '');
  const safeDate  = formatDate(it.published_at);
  const safeUrl   = escapeHtml(it.url || '#');

  const alertBadge = isAlert
    ? `<span class="alert-badge-card">발송 대상</span>`
    : '';

  const reasonHtml = safeReason
    ? `<div class="card-reason" aria-label="판단 근거">${safeReason}</div>`
    : '';

  return `
    <article class="card${isAlert ? ' card-alert' : ''}"
             data-cat="${escapeHtml(catKey)}"
             role="listitem">
      <div class="card-top">
        ${catPill(catKey)}
        <div class="card-top-right">
          ${alertBadge}
          <span class="score-badge ${sCls}" aria-label="중요도 점수 ${sLabel}">${sLabel}</span>
        </div>
      </div>
      <div class="card-title">
        <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeTitle}</a>
      </div>
      ${reasonHtml}
      <div class="card-meta">
        <span class="source">${safeSrc}</span>
        ${safeDate ? `<span class="dot" aria-hidden="true">·</span><time datetime="${escapeHtml(it.published_at || '')}">${safeDate}</time>` : ''}
      </div>
    </article>`;
}

// ─── 목록 렌더 ─────────────────────────────────────────────
function render(elId, items, isAlert) {
  const el = document.getElementById(elId);
  const arr = Array.isArray(items) ? items : [];

  if (arr.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon" aria-hidden="true">${isAlert ? '🔔' : '📋'}</div>
        <p>${isAlert ? '현재 발송 대상 알림이 없습니다.' : '수집된 뉴스가 없습니다.'}</p>
        <p class="empty-hint">수집 실행 버튼을 눌러 뉴스를 가져오세요.</p>
      </div>`;
    return;
  }

  el.innerHTML = arr.map(it => buildCard(it, isAlert)).join('');

  // 카운트 배지
  const countId = isAlert ? 'alerts-count' : 'news-count';
  const countEl = document.getElementById(countId);
  if (countEl) {
    countEl.textContent = arr.length;
    countEl.style.display = arr.length > 0 ? '' : 'none';
  }
}

// ─── 데이터 로드 ───────────────────────────────────────────
async function load() {
  clearGlobalError();
  try {
    const [aRes, nRes] = await Promise.all([
      fetch('/api/alerts'),
      fetch('/api/news')
    ]);
    if (!aRes.ok || !nRes.ok) throw new Error(`서버 응답 오류 (alerts:${aRes.status} / news:${nRes.status})`);
    const [a, n] = await Promise.all([aRes.json(), nRes.json()]);
    render('alerts', a.items, true);
    render('news',   n.items, false);
  } catch (e) {
    showGlobalError('뉴스 데이터를 불러오는 중 오류가 발생했습니다. (' + e.message + ')');
    render('alerts', [], true);
    render('news',   [], false);
  }
}

// ─── 수집 실행 ─────────────────────────────────────────────
async function collect() {
  const btn    = document.getElementById('collect-btn');
  const status = document.getElementById('collect-status');

  btn.disabled = true;
  status.innerHTML = '<span class="spinner" aria-hidden="true"></span><span>수집 중...</span>';

  try {
    const res = await fetch('/api/collect', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const r = await res.json();
    const msg = (r && r.collected !== undefined)
      ? `${r.collected}건 수집 완료`
      : '수집 완료';
    status.innerHTML = `<span class="status-ok">✓</span><span>${msg}</span>`;
    await load();
  } catch (e) {
    status.innerHTML = `<span class="status-err">✗</span><span>수집 실패: ${escapeHtml(e.message)}</span>`;
  } finally {
    btn.disabled = false;
    // 3초 후 상태 메시지 제거
    setTimeout(() => { status.innerHTML = ''; }, 3000);
  }
}

// ─── 초기화 ────────────────────────────────────────────────
loadConfig();
load();
</script>
</body>
</html>
